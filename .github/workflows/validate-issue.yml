name: Issue Validator

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate Issue Format
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').trim();
            const body  = (issue.body  || '').trim();

            let errors = [];

            // Title and body must match
            if (title !== body) {
              errors.push("- Title and body must be exactly identical.");
            }

            // Accepts both:
            //   <HeroeName|Username>
            //   <HeroeName|Username|#RRGGBB>  or  <HeroeName|Username|#RGB>
            const RE = /^<\s*heroename\s*\|\s*(.*?)\s*(?:\|\s*(#[0-9a-fA-F]{3,6})\s*)?\s*>$/i;
            const match = title.match(RE);

            let hasColor    = false;
            let colorHint   = '';

            if (!match) {
              errors.push(
                "- The content must be exactly `<HeroeName|Username>` or `<HeroeName|Username|#RRGGBB>` with no extra text before or after."
              );
            } else {
              const username = match[1];
              const color    = match[2];

              // Username validations
              if (!username || username.length === 0) {
                errors.push("- Username cannot be empty.");
              }
              if (username.length > 15) {
                errors.push(`- Username is too long (${username.length} characters). Maximum allowed is 15.`);
              }
              if (/[^a-zA-Z\u0400-\u04FF0-9_ -]/.test(username)) {
                errors.push("- Username contains invalid characters. Only letters (latin/cyrillic), numbers, spaces, underscores, and hyphens are allowed.");
              }

              // Color validations (optional field)
              if (color !== undefined) {
                hasColor = true;
                if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(color)) {
                  errors.push(`- Color \`${color}\` is not a valid hex color. Use format \`#RGB\` or \`#RRGGBB\` (e.g. \`#FF0000\`).`);
                }
              }
            }

            const isValid = errors.length === 0;

            // Ensure labels exist
            for (const [name, color] of [['Valid', '0E8A16'], ['Invalid', 'D93F0B']]) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (e) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color });
              }
            }

            if (isValid) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['Valid']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'Invalid'
                });
              } catch (e) {}

              // Build success comment
              let commentBody = "✅ **Validation passed!** Your username will be added to the badge.";

              if (!hasColor) {
                commentBody += `

💡 **Tip — want a custom color?**
You can also specify your own color by editing the issue to:
\`\`\`
<HeroeName|${match ? match[1].trim() : 'YourUsername'}|#FF0000>
\`\`\`
Replace \`#FF0000\` with any hex color you like (e.g. \`#00FFAA\`, \`#3f88e6\`).
Without a color, a random one is assigned automatically — which is totally fine! 🎨`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, body: commentBody
              });

            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['Invalid']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'Valid'
                });
              } catch (e) {}

              const commentBody = "❌ **Validation failed.** Please edit your issue to fix the following:\n\n" + errors.join("\n");
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, body: commentBody
              });
            }
