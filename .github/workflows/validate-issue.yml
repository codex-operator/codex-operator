name: Issue Validator

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read        # нужно для checkout и чтения banned-words.txt

    steps:
      # ── 1. Checkout репозитория (нужен для чтения banned-words.txt) ──────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Основная валидация ─────────────────────────────────────────────────
      - name: Validate Issue Format
        uses: actions/github-script@v7
        with:
          # github-token передаётся явно, чтобы гарантировать права на issues: write
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const issue = context.payload.issue;
            const title = (issue.title || '').trim();
            const body  = (issue.body  || '').trim();

            let errors = [];

            // ── Лимит длины до regex (защита от ReDoS) ─────────────────────
            const MAX_LEN = 60;
            if (title.length > MAX_LEN) {
              errors.push(`- Issue title is too long (${title.length} chars). Maximum allowed: ${MAX_LEN}.`);
            }

            // ── Title и body должны совпадать ───────────────────────────────
            if (title !== body) {
              errors.push('- Title and body must be exactly identical.');
            }

            // ── Строгий regex (без .*?) ─────────────────────────────────────
            const RE = /^<\s*HeroeName\s*\|\s*([a-zA-Z\u0400-\u04FF0-9_ -]{1,15})\s*(?:\|\s*(#[0-9a-fA-F]{3,6})\s*)?\s*>$/i;
            const match = title.length <= MAX_LEN ? title.match(RE) : null;

            let hasColor  = false;
            let heroName  = '';

            if (!match) {
              if (title.length <= MAX_LEN) {          // ошибку длины уже добавили выше
                errors.push(
                  '- The content must be exactly `<HeroeName|Username>` or `<HeroeName|Username|#RRGGBB>` with no extra text.'
                );
              }
            } else {
              heroName        = match[1].trim();
              const color     = match[2];

              if (!heroName || heroName.length === 0) {
                errors.push('- Username cannot be empty.');
              }
              if (heroName.length > 15) {
                errors.push(`- Username is too long (${heroName.length} chars). Maximum: 15.`);
              }
              if (/[^a-zA-Z\u0400-\u04FF0-9_ -]/.test(heroName)) {
                errors.push('- Username contains invalid characters. Only letters (latin/cyrillic), numbers, spaces, underscores, and hyphens are allowed.');
              }

              if (color !== undefined) {
                hasColor = true;
                if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(color)) {
                  errors.push(`- Color \`${color}\` is not valid. Use \`#RGB\` or \`#RRGGBB\` (e.g. \`#FF0000\`).`);
                }
              }

              // ── Проверка banned-words.txt ─────────────────────────────────
              const bannedPath = path.join(process.env.GITHUB_WORKSPACE, 'banned-words.txt');
              if (fs.existsSync(bannedPath)) {
                const banned = fs.readFileSync(bannedPath, 'utf8')
                  .split('\n')
                  .map(w => w.trim().toLowerCase())
                  .filter(Boolean);

                const lowerName = heroName.toLowerCase();
                const found = banned.find(w => lowerName.includes(w));
                if (found) {
                  errors.push(`- Username contains a banned word: \`${found}\`.`);
                }
              }
            }

            // ── Лимит: не более 2 принятых issues от одного пользователя ───
            if (errors.length === 0) {
              const login = issue.user.login;

              // Получаем все issues репозитория (кроме текущего)
              const allIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'all',
                per_page: 100,
              });

              const RE_CHECK = /^<\s*HeroeName\s*\|\s*([a-zA-Z\u0400-\u04FF0-9_ -]{1,15})\s*(?:\|\s*(#[0-9a-fA-F]{3,6})\s*)?\s*>$/i;

              const validFromAuthor = allIssues.filter(i =>
                i.number !== issue.number &&          // не считаем текущий
                i.user?.login === login &&
                (i.title || '').trim().length <= MAX_LEN &&
                RE_CHECK.test((i.title || '').trim()) &&
                i.labels.some(l => l.name === 'Valid')
              );

              if (validFromAuthor.length >= 2) {
                errors.push(
                  `- You already have **${validFromAuthor.length}** accepted issues. Maximum per user is **2**.`
                );
              }
            }

            // ────────────────────────────────────────────────────────────────
            // Убедимся что лейблы существуют
            // ────────────────────────────────────────────────────────────────
            for (const [name, color] of [['Valid', '0E8A16'], ['Invalid', 'D93F0B']]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name
                });
              } catch (_) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name, color
                });
              }
            }

            const isValid = errors.length === 0;

            if (isValid) {
              // Добавляем Valid, убираем Invalid
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['Valid']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'Invalid'
                });
              } catch (_) {}

              let commentBody = ' **Validation passed!** Your username will be added to the badge.';

              if (!hasColor && heroName) {
                commentBody += `\n\n💡 **Tip — want a custom color?**
You can also specify your own color by editing the issue to:
\`\`\`
<HeroeName|${heroName}|#FF0000>
\`\`\`
Replace \`#FF0000\` with any hex color you like (e.g. \`#00FFAA\`, \`#3f88e6\`).
Without a color, a random one is assigned automatically — which is totally fine!`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, body: commentBody
              });

            } else {
              // Добавляем Invalid, убираем Valid
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['Invalid']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'Valid'
                });
              } catch (_) {}

              const commentBody =
                ' **Validation failed.** Please edit your issue to fix the following:\n\n' +
                errors.join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, body: commentBody
              });
            }
